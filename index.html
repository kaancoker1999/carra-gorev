<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Carra Görev</title>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18",
    "react-dom": "https://esm.sh/react-dom@18",
    "react-dom/client": "https://esm.sh/react-dom@18/client",
    "lucide-react": "https://esm.sh/lucide-react?external=react,react-dom"
  }
}
</script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { min-height: 100%; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root">Yükleniyor...</div>
<script type="module">
  const res = await fetch('./carra-gorev-prototip.jsx');
  const source = await res.text();
  const transformed = Babel.transform(source, { presets: ['react'] }).code;
  const blob = new Blob([transformed], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const mod = await import(url);
  const React = (await import('react')).default;
  const { createRoot } = await import('react-dom/client');
  const rootEl = document.getElementById('root');
  rootEl.innerHTML = '';
  createRoot(rootEl).render(React.createElement(mod.default));
</script>
</body>
</html>
